name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04' # for x86_64 Linux.
            args: ''
          - platform: 'ubuntu-22.04-arm' # for ARM64 Linux (aarch64).
            args: '--target aarch64-unknown-linux-gnu'
          - platform: 'windows-2022'
            args: '--target x86_64-pc-windows-msvc'
          - platform: 'windows-2022'
            args: '--target aarch64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: false
          run-install: true

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

        # failed to build app: Target aarch64-pc-windows-msvc is not installed (installed targets: i686-pc-windows-msvc, x86_64-pc-windows-gnu, x86_64-pc-windows-msvc). Please run `rustup target add aarch64-pc-windows-msvc`.
      - name: Install rust target
        if: ${{ matrix.platform == 'windows-2022' }}
        run: rustup target add aarch64-pc-windows-msvc

      - name: Install rust target (Linux ARM64)
        if: ${{ matrix.platform == 'ubuntu-22.04-arm' }}
        run: rustup target add aarch64-unknown-linux-gnu

      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils
        # webkitgtk 4.0 is for Tauri v1 - webkitgtk 4.1 is for Tauri v2.
        # You can remove the one that doesn't apply to your app to speed up the workflow a bit.

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: 'v__VERSION__ 🌈'
          releaseBody: |


            | OS | Download |
            | --- | --- |
            | Windows | [Installer (x64)](https://github.com/hepengju/redis-me/releases/download/v__VERSION__/RedisME___VERSION___x64-setup.exe) · [Portable (x64)](https://github.com/hepengju/redis-me/releases/download/v__VERSION__/RedisME___VERSION___portable_x64.zip) · [Installer (Arm64)](https://github.com/hepengju/redis-me/releases/download/v__VERSION__/RedisME___VERSION___arm64-setup.exe) · [Portable (Arm64)](https://github.com/hepengju/redis-me/releases/download/v__VERSION__/RedisME___VERSION___portable_arm64.zip) |
            | Mac | [Apple Silicon](https://github.com/hepengju/redis-me/releases/download/v__VERSION__/RedisME___VERSION___aarch64.dmg) · [Intel Mac](https://github.com/hepengju/redis-me/releases/download/v__VERSION__/RedisME___VERSION___x64.dmg) |
            | Linux | [amd64 deb](https://github.com/hepengju/redis-me/releases/download/v__VERSION__/RedisME___VERSION___amd64.deb) · [arm64 deb](https://github.com/hepengju/redis-me/releases/download/v__VERSION__/RedisME___VERSION___arm64.deb) · [x86_64 rpm](https://github.com/hepengju/redis-me/releases/download/v__VERSION__/RedisME-__VERSION__-1.x86_64.rpm) · [aarch64 rpm](https://github.com/hepengju/redis-me/releases/download/v__VERSION__/RedisME-__VERSION__-1.aarch64.rpm) · [amd64 AppImage](https://github.com/hepengju/redis-me/releases/download/v__VERSION__/RedisME___VERSION___amd64.AppImage) · [aarch64 AppImage](https://github.com/hepengju/redis-me/releases/download/v__VERSION__/RedisME___VERSION___aarch64.AppImage) |
          releaseDraft: true
          prerelease: false
          tauriScript: vp run tauri
          args: ${{ matrix.args }}

      - name: Create portable zip (Windows)
        if: matrix.platform == 'windows-2022'
        shell: pwsh
        run: |
          $arch = if ('${{ matrix.args }}' -match 'aarch64') { 'arm64' } else { 'x64' }
          $version = '${{ github.ref_name }}' -replace '^v', ''
          $targetDir = if ('${{ matrix.args }}' -match '--target') { '${{ matrix.args }}'.Split(' ')[1] } else { '' }
          $exePath = if ($targetDir) { "src-tauri/target/$targetDir/release/RedisME.exe" } else { "src-tauri/target/release/RedisME.exe" }
          $zipName = "RedisME_${version}_portable_$arch.zip"
          Compress-Archive -Path $exePath -DestinationPath $zipName
          Write-Host "Created: $zipName"

      - name: Upload portable zip to release (Windows)
        if: matrix.platform == 'windows-2022'
        uses: softprops/action-gh-release@v3
        with:
          files: RedisME_*_portable_*.zip
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
