services:
  redis8-7001:
    image: redis:8
    container_name: redis8-7001
    command: redis-server --cluster-enabled yes --port 7001 --cluster-announce-ip 8.159.152.225 --requirepass hepengju --masterauth hepengju
    restart: always
    network_mode: "host"
