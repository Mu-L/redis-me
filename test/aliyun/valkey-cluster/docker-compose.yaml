services:
  valkey9-9001:
    image: valkey/valkey:9
    container_name: valkey9-9001
    command: redis-server --cluster-enabled yes --port 9001 --cluster-announce-ip 8.159.152.225 --requirepass hepengju --masterauth hepengju
